<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Country Valuation Checker</title>

    <style>
        :root {
            --bg-color: #0a0e1a;
            --card-bg: #161f35;
            --border-color: #1e2d4a;
            --accent-cyan: #00d4ff;
            --accent-purple: #7c3aed;
            --gold: #f59e0b;
            --text-main: #e2e8f0;
            --text-muted: #94a3b8;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: Arial, Helvetica, sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 2rem 1rem;
            position: relative;
            overflow-x: hidden;
        }

        body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: radial-gradient(circle, rgba(255, 255, 255, 0.05) 1px, transparent 1px);
            background-size: 30px 30px;
            z-index: -1;
        }

        .container {
            width: 100%;
            max-width: 900px;
            display: flex;
            flex-direction: column;
            gap: 2rem;
        }

        header {
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.75rem;
        }

        .badge-pill {
            background: rgba(124, 58, 237, 0.2);
            border: 1px solid var(--accent-purple);
            color: var(--accent-purple);
            padding: 0.25rem 0.75rem;
            border-radius: 9999px;
            font-size: 0.75rem;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        h1 {
            font-size: 2.5rem;
            background: linear-gradient(to right, var(--accent-cyan), var(--accent-purple));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: 800;
        }

        .subtitle {
            color: var(--text-muted);
            font-size: 1rem;
        }

        .search-container {
            position: relative;
            width: 100%;
            max-width: 600px;
            margin: 0 auto;
        }

        .search-bar {
            display: flex;
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 0.5rem;
            transition: border-color 0.3s ease;
        }

        .search-bar:focus-within {
            border-color: var(--accent-cyan);
        }

        input {
            flex: 1;
            background: transparent;
            border: none;
            color: white;
            padding: 0.75rem 1rem;
            font-size: 1.1rem;
            outline: none;
        }

        .search-btn {
            background: linear-gradient(135deg, var(--accent-cyan), var(--accent-purple));
            border: none;
            border-radius: 8px;
            padding: 0.75rem 1.25rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: opacity 0.2s;
        }

        .search-btn:hover {
            opacity: 0.9;
        }

        .search-btn svg {
            width: 20px;
            height: 20px;
            fill: white;
        }

        .autocomplete-dropdown {
            position: absolute;
            top: 100%;
            left: 0;
            right: 0;
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            margin-top: 0.5rem;
            z-index: 100;
            max-height: 320px;
            overflow-y: auto;
            display: none;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
        }

        .autocomplete-item {
            padding: 0.75rem 1.25rem;
            cursor: pointer;
            transition: background 0.2s;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }

        .autocomplete-item:last-child {
            border-bottom: none;
        }

        .autocomplete-item:hover {
            background: rgba(255,255,255,0.05);
        }

        .quick-chips {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 0.5rem;
            margin-top: 1rem;
        }

        .chip {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            padding: 0.4rem 0.8rem;
            border-radius: 20px;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 0.4rem;
        }

        .chip:hover {
            border-color: var(--accent-cyan);
            background: rgba(0, 212, 255, 0.1);
            transform: translateY(-2px);
        }

        #error-msg {
            color: #f87171;
            text-align: center;
            font-size: 0.9rem;
            display: none;
        }

        .result-section {
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
            animation: fadeIn 0.4s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .hero-card {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 2rem;
            position: relative;
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .flag-large {
            font-size: 58px;
            line-height: 1;
        }

        .hero-header {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        .hero-header h2 {
            font-size: 2rem;
        }

        .tag-container {
            display: flex;
            gap: 0.5rem;
            flex-wrap: wrap;
        }

        .tag {
            background: rgba(255,255,255,0.05);
            padding: 0.2rem 0.6rem;
            border-radius: 4px;
            font-size: 0.75rem;
            color: var(--text-muted);
        }

        .gdp-rank-badge {
            position: absolute;
            top: 2rem;
            right: 2rem;
            background: rgba(245, 158, 11, 0.1);
            border: 1px solid var(--gold);
            color: var(--gold);
            padding: 0.5rem 1rem;
            border-radius: 8px;
            font-weight: bold;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .rank-label {
            font-size: 0.6rem;
            text-transform: uppercase;
        }

        .rank-value {
            font-size: 1.2rem;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1rem;
        }

        .stat-card {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            padding: 1.5rem;
            border-radius: 12px;
            transition: all 0.3s ease;
        }

        .stat-card:hover {
            transform: translateY(-2px);
            border-color: var(--accent-cyan);
            box-shadow: 0 0 15px rgba(0, 212, 255, 0.1);
        }

        .stat-label {
            color: var(--text-muted);
            font-size: 0.8rem;
            margin-bottom: 0.5rem;
        }

        .stat-value {
            font-size: 1.25rem;
            font-weight: bold;
        }

        .economy-overview {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            padding: 1.5rem;
            border-radius: 12px;
            display: flex;
            flex-direction: column;
            gap: 1.25rem;
        }

        .economy-overview h3 {
            font-size: 1rem;
            color: var(--text-muted);
            margin-bottom: 0.5rem;
        }

        .progress-item {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        .progress-label {
            display: flex;
            justify-content: space-between;
            font-size: 0.85rem;
        }

        .progress-bar-bg {
            background: rgba(255,255,255,0.05);
            height: 8px;
            border-radius: 4px;
            overflow: hidden;
        }

        .progress-bar-fill {
            height: 100%;
            background: linear-gradient(to right, var(--accent-cyan), var(--accent-purple));
            border-radius: 4px;
        }

        .info-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 1rem;
        }

        .info-box {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            padding: 1.5rem;
            border-radius: 12px;
        }

        .info-box h4 {
            font-size: 0.9rem;
            color: var(--accent-cyan);
            margin-bottom: 1rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .info-list {
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
        }

        .info-item {
            display: flex;
            justify-content: space-between;
            font-size: 0.9rem;
        }

        .info-key {
            color: var(--text-muted);
        }

        .income-tag {
            padding: 0.1rem 0.5rem;
            border-radius: 4px;
            font-weight: bold;
            font-size: 0.75rem;
        }

        footer {
            margin-top: auto;
            padding: 2rem 0;
            color: var(--text-muted);
            font-size: 0.8rem;
            text-align: center;
        }

        @media (max-width: 600px) {
            h1 { font-size: 1.8rem; }
            .hero-card { padding: 1.5rem; }
            .gdp-rank-badge { position: static; margin-top: 1rem; width: fit-content; }
            .info-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>

        const RANK = {};
        const WORLD_GDP = DB.reduce((sum, row) => sum + row[6], 0);
        const WORLD_POP = DB.reduce((sum, row) => sum + row[5], 0);

        function initRank() {
            const sorted = [...DB].sort((a, b) => b[6] - a[6]);
            sorted.forEach((row, index) => {
                RANK[row[0]] = index + 1;
            });
        }

        function escHtml(str) {
            if (!str) return '';
            return String(str).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
        }

        function escAttr(str) {
            return escHtml(str).replace(/'/g, '&#39;');
        }

        function getFlagEmoji(iso2) {
            if (iso2 === 'XX') return '🌍';
            return iso2.toUpperCase().replace(/./g, char => 
                String.fromCodePoint(char.charCodeAt(0) + 127397)
            );
        }

        function formatNum(num) {
            if (num >= 1000000000) return (num / 1000000000).toFixed(1) + 'B';
            if (num >= 1000000) return (num / 1000000).toFixed(1) + 'M';
            return num.toLocaleString();
        }

        function getIncomeClass(gdpPerCapita) {
            if (gdpPerCapita >= 13000) return { label: "High Income", color: "#34d399" };
            if (gdpPerCapita >= 4500) return { label: "Upper-Middle Income", color: "#fbbf24" };
            if (gdpPerCapita >= 1100) return { label: "Lower-Middle Income", color: "#fb923c" };
            return { label: "Low Income", color: "#f87171" };
        }

        function renderResult(countryName) {
            const country = DB.find(c => c[0].toLowerCase() === countryName.toLowerCase());
            const container = document.getElementById('result-container');
            const errorMsg = document.getElementById('error-msg');
            
            if (!country) {
                container.innerHTML = '';
                errorMsg.style.display = 'block';
                return;
            }

            errorMsg.style.display = 'none';
            const [name, iso2, capital, region, subregion, pop, gdpB, curr, currCode, lang, area, tz] = country;
            const rank = RANK[name];
            const gdpPerCapita = (gdpB * 1000000000) / pop;
            const income = getIncomeClass(gdpPerCapita);
            
            const gdpShare = (gdpB / WORLD_GDP) * 100;
            const popShare = (pop / WORLD_POP) * 100;
            const wealthIndex = Math.min(100, (gdpPerCapita / 80000) * 100);

            container.innerHTML = `
                <div class="result-section">
                    <div class="hero-card">
                        <div class="flag-large">${getFlagEmoji(iso2)}</div>
                        <div class="hero-header">
                            <h2>${escHtml(name)}</h2>
                            <div class="tag-container">
                                <span class="tag">${escHtml(region)}</span>
                                <span class="tag">${escHtml(capital)}</span>
                                <span class="tag">${escHtml(currCode)}</span>
                            </div>
                        </div>
                        <div class="gdp-rank-badge">
                            <span class="rank-label">GDP Rank</span>
                            <span class="rank-value">#${rank}</span>
                        </div>
                    </div>

                    <div class="stats-grid">
                        <div class="stat-card">
                            <div class="stat-label">GDP (Nominal)</div>
                            <div class="stat-value">$${gdpB >= 1000 ? (gdpB/1000).toFixed(2) + 'T' : gdpB + 'B'}</div>
                        </div>
                        <div class="stat-card">
                            <div class="stat-label">GDP Per Capita</div>
                            <div class="stat-value">$${Math.round(gdpPerCapita).toLocaleString()}</div>
                        </div>
                        <div class="stat-card">
                            <div class="stat-label">Population</div>
                            <div class="stat-value">${formatNum(pop)}</div>
                        </div>
                        <div class="stat-card">
                            <div class="stat-label">Capital City</div>
                            <div class="stat-value">${escHtml(capital)}</div>
                        </div>
                    </div>

                    <div class="economy-overview">
                        <h3>Economic & World Standing</h3>
                        <div class="progress-item">
                            <div class="progress-label">
                                <span>Global GDP Share</span>
                                <span>${gdpShare.toFixed(2)}%</span>
                            </div>
                            <div class="progress-bar-bg">
                                <div class="progress-bar-fill" style="width: ${Math.max(1, gdpShare)}%"></div>
                            </div>
                        </div>
                        <div class="progress-item">
                            <div class="progress-label">
                                <span>World Population Share</span>
                                <span>${popShare.toFixed(2)}%</span>
                            </div>
                            <div class="progress-bar-bg">
                                <div class="progress-bar-fill" style="width: ${Math.max(1, popShare)}%"></div>
                            </div>
                        </div>
                        <div class="progress-item">
                            <div class="progress-label">
                                <span>Wealth Per Person Index</span>
                                <span>${Math.round(wealthIndex)}/100</span>
                            </div>
                            <div class="progress-bar-bg">
                                <div class="progress-bar-fill" style="width: ${Math.max(1, wealthIndex)}%"></div>
                            </div>
                        </div>
                    </div>

                    <div class="info-grid">
                        <div class="info-box">
                            <h4>Financial Profile</h4>
                            <div class="info-list">
                                <div class="info-item">
                                    <span class="info-key">Currency</span>
                                    <span>${escHtml(curr)}</span>
                                </div>
                                <div class="info-item">
                                    <span class="info-key">Currency Code</span>
                                    <span>${escHtml(currCode)}</span>
                                </div>
                                <div class="info-item">
                                    <span class="info-key">Economy Class</span>
                                    <span class="income-tag" style="background: ${income.color}; color: #0a0e1a">${income.label}</span>
                                </div>
                                <div class="info-item">
                                    <span class="info-key">GDP in Trillions</span>
                                    <span>$${(gdpB / 1000).toFixed(3)}T</span>
                                </div>
                            </div>
                        </div>
                        <div class="info-box">
                            <h4>Geography & Stats</h4>
                            <div class="info-list">
                                <div class="info-item">
                                    <span class="info-key">Region</span>
                                    <span>${escHtml(region)}</span>
                                </div>
                                <div class="info-item">
                                    <span class="info-key">Subregion</span>
                                    <span>${escHtml(subregion)}</span>
                                </div>
                                <div class="info-item">
                                    <span class="info-key">Languages</span>
                                    <span>${escHtml(lang)}</span>
                                </div>
                                <div class="info-item">
                                    <span class="info-key">Area km²</span>
                                    <span>${area.toLocaleString()}</span>
                                </div>
                                <div class="info-item">
                                    <span class="info-key">Timezone</span>
                                    <span>${escHtml(tz)}</span>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            `;
            
            // Scroll to result on mobile
            if (window.innerWidth < 600) {
                container.scrollIntoView({ behavior: 'smooth' });
            }
        }

        function setupQuickChips() {
            const quick = ["United States", "China", "India", "Germany", "Japan", "United Kingdom", "Brazil", "Canada", "Australia", "France", "Saudi Arabia", "South Korea", "Turkey", "Mexico", "Indonesia"];
            const container = document.getElementById('quick-chips');
            
            quick.forEach(name => {
                const country = DB.find(c => c[0] === name);
                if (country) {
                    const chip = document.createElement('div');
                    chip.className = 'chip';
                    chip.dataset.name = name;
                    chip.innerHTML = `<span>${getFlagEmoji(country[1])}</span> ${name}`;
                    container.appendChild(chip);
                }
            });

            container.addEventListener('click', (e) => {
                const chip = e.target.closest('.chip');
                if (chip) {
                    const name = chip.dataset.name;
                    document.getElementById('country-input').value = name;
                    renderResult(name);
                    document.getElementById('dropdown').style.display = 'none';
                }
            });
        }

        function setupSearch() {
            const input = document.getElementById('country-input');
            const dropdown = document.getElementById('dropdown');
            const btn = document.getElementById('search-btn');

            input.addEventListener('input', (e) => {
                const val = e.target.value.toLowerCase();
                if (!val) {
                    dropdown.style.display = 'none';
                    return;
                }

                const matches = DB.filter(c => 
                    c[0].toLowerCase().startsWith(val) || 
                    c[0].toLowerCase().includes(val)
                ).slice(0, 8);

                if (matches.length > 0) {
                    dropdown.innerHTML = matches.map(c => `
                        <div class="autocomplete-item" data-name="${escAttr(c[0])}">
                            ${getFlagEmoji(c[1])} ${escHtml(c[0])}
                        </div>
                    `).join('');
                    dropdown.style.display = 'block';
                } else {
                    dropdown.style.display = 'none';
                }
            });

            dropdown.addEventListener('click', (e) => {
                const item = e.target.closest('.autocomplete-item');
                if (item) {
                    const name = item.dataset.name;
                    input.value = name;
                    renderResult(name);
                    dropdown.style.display = 'none';
                }
            });

            btn.addEventListener('click', () => {
                renderResult(input.value);
                dropdown.style.display = 'none';
            });

            input.addEventListener('keydown', (e) => {
                if (e.key === 'Enter') {
                    renderResult(input.value);
                    dropdown.style.display = 'none';
                }
                if (e.key === 'Escape') {
                    dropdown.style.display = 'none';
                }
            });

            document.addEventListener('click', (e) => {
                if (!dropdown.contains(e.target) && e.target !== input) {
                    dropdown.style.display = 'none';
                }
            });
        }

        // Initialization
        window.onload = () => {
            initRank();
            setupQuickChips();
            setupSearch();
            
            // Default load
            renderResult("United States");
        };
    </script>
